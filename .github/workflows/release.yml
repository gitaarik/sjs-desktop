name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    outputs:
      is_prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4
      - name: Check tag matches tauri.conf.json version
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          VERSION=$(jq -r '.version' src-tauri/tauri.conf.json)
          if [ "$TAG" != "$VERSION" ]; then
            echo "::error::Tag v$TAG does not match tauri.conf.json version $VERSION"
            echo "Update the version in src-tauri/tauri.conf.json to $TAG before tagging."
            exit 1
          fi
          echo "Tag v$TAG matches tauri.conf.json version $VERSION"
      - name: Detect prerelease
        id: prerelease
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          if [[ "$TAG" == *-beta* ]] || [[ "$TAG" == *-alpha* ]] || [[ "$TAG" == *-rc* ]]; then
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-version
    if: always() && (needs.check-version.result == 'success' || needs.check-version.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            rust_target: ""
            sidecar_pkg_target: node20-linux-x64
            sidecar_triple: x86_64-unknown-linux-gnu
          - platform: macos-latest
            rust_target: aarch64-apple-darwin
            sidecar_pkg_target: node20-macos-arm64
            sidecar_triple: aarch64-apple-darwin
          - platform: macos-latest
            rust_target: x86_64-apple-darwin
            sidecar_pkg_target: node20-macos-x64
            sidecar_triple: x86_64-apple-darwin
          - platform: windows-latest
            rust_target: ""
            sidecar_pkg_target: node20-win-x64
            sidecar_triple: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target }}

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      # Linux system dependencies for Tauri
      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      # Install Node dependencies
      - name: Install dependencies
        run: |
          npm ci
          cd src/ui && npm ci

      # Build sidecar as standalone native binary (no Node.js required at runtime)
      - name: Build sidecar
        run: |
          npx esbuild src/main/sidecar.ts --bundle --platform=node --outfile=dist/sidecar-bundle.cjs --format=cjs
          npx @yao-pkg/pkg dist/sidecar-bundle.cjs --target ${{ matrix.sidecar_pkg_target }} --output src-tauri/binaries/sjs-sidecar-${{ matrix.sidecar_triple }}${{ matrix.platform == 'windows-latest' && '.exe' || '' }}

      # Patch app identity for beta (different identifier = side-by-side install)
      - name: Patch beta identity
        if: needs.check-version.outputs.is_prerelease == 'true'
        run: node scripts/patch-beta-identity.js

      # Generate macOS .icns for beta icons (iconutil is macOS-only)
      - name: Generate beta .icns
        if: needs.check-version.outputs.is_prerelease == 'true' && startsWith(matrix.platform, 'macos')
        run: |
          ICONSET_DIR=$(mktemp -d)/icon.iconset
          mkdir -p "$ICONSET_DIR"
          cp src-tauri/icons-beta/32x32.png "$ICONSET_DIR/icon_32x32.png"
          cp src-tauri/icons-beta/64x64.png "$ICONSET_DIR/icon_32x32@2x.png"
          cp src-tauri/icons-beta/128x128.png "$ICONSET_DIR/icon_128x128.png"
          cp src-tauri/icons-beta/128x128@2x.png "$ICONSET_DIR/icon_128x128@2x.png"
          cp src-tauri/icons-beta/icon.png "$ICONSET_DIR/icon_256x256.png"
          cp src-tauri/icons-beta/icon.png "$ICONSET_DIR/icon_256x256@2x.png"
          iconutil -c icns "$ICONSET_DIR" -o src-tauri/icons/icon.icns

      # Build UI
      - name: Build UI
        working-directory: src/ui
        run: npm run build

      # Build Tauri app and create GitHub Release
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Updater signing key (generate with: npx tauri signer generate)
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # macOS code signing (optional — set these secrets when you have an Apple Developer cert)
          # APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          # APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: .
          tagName: v__VERSION__
          releaseName: "Smart Job Seeker v__VERSION__"
          releaseBody: |
            ## Download

            Pick the installer for your platform:

            - **macOS (Apple Silicon)** — `.dmg` file (aarch64)
            - **macOS (Intel)** — `.dmg` file (x64)
            - **Windows** — `.msi` or `.exe` installer
            - **Linux** — `.AppImage` (universal) or `.deb` (Debian/Ubuntu)

            ## First launch

            The app downloads Chrome for Testing (~175MB) on first launch. This is a one-time download.

            ## Platform notes

            **macOS**: If you see "unidentified developer", right-click the app and choose **Open**, then click **Open** again in the dialog.

            **Windows**: If SmartScreen shows a warning, click **More info** then **Run anyway**.

            ## Build from source

            See [BUILD.md](https://github.com/gitaarik/sjs-desktop/blob/main/BUILD.md) for instructions.
          releaseDraft: false
          prerelease: ${{ needs.check-version.outputs.is_prerelease == 'true' }}
          # MSI doesn't support semver pre-release identifiers (e.g. -beta.1), so skip it for prereleases
          args: >-
            ${{ matrix.rust_target && format('--target {0}', matrix.rust_target) || '' }}
            ${{ needs.check-version.outputs.is_prerelease == 'true' && matrix.platform == 'windows-latest' && '--bundles nsis' || '' }}

  # For beta releases: copy latest.json to the pinned beta-latest release
  # so the beta update channel always has a stable endpoint
  update-beta-latest:
    needs: [check-version, build]
    if: needs.check-version.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets to be uploaded
        run: sleep 30

      - name: Download latest.json from this release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release download "$TAG" --pattern "latest.json" --dir ./artifacts --repo "$GITHUB_REPOSITORY"

      - name: Upload latest.json to beta-latest release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Create beta-latest release if it doesn't exist
          if ! gh release view beta-latest --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
            gh release create beta-latest --repo "$GITHUB_REPOSITORY" \
              --title "Beta Update Channel" \
              --notes "This release is used by the beta auto-updater. Do not delete." \
              --prerelease
          fi
          # Delete existing latest.json and upload the new one
          gh release delete-asset beta-latest latest.json --repo "$GITHUB_REPOSITORY" --yes 2>/dev/null || true
          gh release upload beta-latest ./artifacts/latest.json --repo "$GITHUB_REPOSITORY" --clobber
