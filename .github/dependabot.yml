# Dependabot config for sjs-desktop (Tauri app).
version: 2
updates:
  # --- npm ---
  - package-ecosystem: npm
    directories:
      - /
      - /src/ui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # --- Rust (Tauri backend) ---
  - package-ecosystem: cargo
    directory: /src-tauri
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      cargo-minor-patch:
        update-types:
          - minor
          - patch

  # --- GitHub Actions ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
