extends: default
rules:
  truthy:
    check-keys: false
  line-length:
    max: 120
  document-start: disable
  indentation:
    spaces: consistent
    indent-sequences: consistent
  comments-indentation: disable
ignore: |
  node_modules/
  package-lock.json
  src-tauri/target/
  src-tauri/gen/
  src/ui/node_modules/
  .git/
